# ===================== Server Configuration =====================

# Port the embedded Tomcat server listens on (default is 8080)
server.port=8080

# ===================== Logging Configuration =====================

# Spring framework internal logs
logging.level.org.springframework=info

# Application logs — debug so LOGGER.debug() calls are visible
logging.level.com.cognizant=debug

# Log pattern: date  time              thread   level  logger   method  line  message
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n
