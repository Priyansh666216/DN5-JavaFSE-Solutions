# Port for this hands-on
server.port=8090

# Logging
logging.level.org.springframework=info
logging.level.com.cognizant=debug
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# JWT secret key — used to sign and verify tokens
# In production this should be stored in a secrets manager, never in source code
jwt.secret=cognizant1234567890cognizant1234567890cognizant1234567890

# Token validity: 20 minutes in milliseconds
jwt.validity=1200000
