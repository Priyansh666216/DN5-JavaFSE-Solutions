# ===================== Logging Levels =====================

# Spring Framework internal logs — set to info to avoid too much noise
logging.level.org.springframework=info

# Application logs — set to debug so LOGGER.debug() calls are visible
logging.level.com.cognizant=debug

# Hibernate SQL logs — trace shows every SQL query being executed
logging.level.org.hibernate.SQL=trace

# Hibernate parameter binding — shows the actual values sent to DB
logging.level.org.hibernate.type.descriptor.sql=trace

# ===================== Log Pattern =====================
# Format: date  time              thread   level  logger              method  line  message
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# ===================== Database Configuration =====================

# JDBC driver for MySQL 8
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection URL — change 'ormlearn' to your schema name if different
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn

# MySQL credentials — update these to match your local MySQL setup
spring.datasource.username=root
spring.datasource.password=root

# ===================== Hibernate Configuration =====================

# validate — Hibernate checks that entity fields match the DB columns
# Other options: create, create-drop, update, none
spring.jpa.hibernate.ddl-auto=validate

# MySQL5Dialect — tells Hibernate how to generate SQL for MySQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect
